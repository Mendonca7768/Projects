<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>

    <link rel="icon" href="favicon.ico">
</head>
<body>

    <h1>Contato</h1>

    <a href="index.html">Voltar para Home</a>

    <h2>Formulário de Cadastro</h2>

    <form>

        
        <label>Nome:</label><br>
        <input type="text" name="nome"><br><br>
        <input type="text" id="nome" name="nome" size="40" 
            maxlength="35" minlength="5" required placeholder="Digite seu nome completo sem abreviações">
        
        <label>E-mail:</label><br>
        <input type="email" name="email"><br><br>

        
        <label>Telefone:</label><br>
        <input type="tel" name="telefone"><br><br>

        
        <label>Data de Nascimento:</label><br>
        <input type="date" name="data"><br><br>

        
        <label>Senha:</label><br>
        <input type="password" name="senha"><br><br>

        
        <label>Cidade:</label><br>
        <select>
            <option>São Paulo</option>
            <option>Campinas</option>
            <option>Sumaré</option>
        </select>

        <br><br>

        
        <label>Digite sua duvída:</label><br>
        <textarea rows="4" cols="40"></textarea>

        <br><br>

        <input type="submit" value="Enviar">

    </form>


</body>
</html>
